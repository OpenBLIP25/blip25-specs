# =============================================================================

[specs."TIA-102.BABA"]
title = "P25 Vocoder Description (original IMBE)"
classification = ["vocoder"]
status = "not_required"
current_revision = "Superseded by BABA-A"
notes = """
Superseded by TIA-102.BABA-A (2014), which merges the 2003 full-rate BABA
and the 2009 BABA-1 half-rate addendum into a single document. BABA-A is
fully processed (Phase 1–4) with implementation spec, annex CSVs, and
analysis notes — no separate Phase 3 needed for BABA or BABA-1.

Directory holds 3 PDFs for archival: TIA-102.BABA_2003.pdf (original
full-rate), TIA-102.BABA-1 Final for Publication.pdf (half-rate
addendum), and an earlier BABA-1 draft. The `TIA-102-BABA_Summary.txt`
and `TIA-102-BABA_Related_Resources.md` files in this directory describe
the BABA-1 half-rate addendum despite their BABA-named filenames
(artifact of `tools/process_specs.py::find_pdf` picking the 6.6 MB
BABA-1 PDF over the 1.7 MB 2003 original). Kept as-is since BABA-A's
impl spec is the canonical reference.
"""

[specs."TIA-102.BABA-A"]
title = "P25 Vocoder Description (IMBE Full-Rate and Half-Rate)"
classification = ["vocoder"]
status = "processed"
current_revision = "BABA-A"
published = "2014-02"
ansi = true
processed_date = "2026-04-12"
rust_modules = ["p25_vocoder::imbe", "p25_vocoder::ambe"]
notes = """
Full-rate IMBE (7.2 kbps, 144 bits/20ms) and half-rate (3.6 kbps, 49 bits/20ms).
Phase 1 (FDMA) uses full-rate; Phase 2 (TDMA) uses half-rate. Quantization
tables in Annexes A-T. Note: IMBE frame format is a transport container for
MBE model parameters — synthesis engine is independent of frame format.
See analysis/vocoder_wire_vs_codec.md.

Known BABA-A PDF errata (tracked in analysis/phase4_findings_log.md and
analysis/vocoder_decode_disambiguations.md):
- Eq. 69 gain inverse DCT prints J̃_i in the cosine denominator; should
  be 6 (matches Eq. 61 encoder forward DCT). Resolved 2026-04-16 —
  implementers use 6.
- Earlier drafts of the disambiguation notes mis-cited the half-rate
  decoder predictor as Eq. 200; correct citation is Eq. 185 (page 65).
  Eq. 200–205 is a separate block (frame-repeat copy-forward).
  Resolved 2026-04-16.
"""

