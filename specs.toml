# P25 TIA-102 Standards Cross-Reference Index
#
# This file tracks which TIA specs have been processed, what files were produced,
# and which Rust modules implement them.
#
# Status values:
#   "processed"    - Phase 2 + Phase 3 (implementation specs produced)
#   "extracted"    - Phase 2 only (full text, summary, context — no impl specs yet)
#   "pending"      - Have the PDF, not yet processed
#   "not_required" - Overview/conformance/measurement doc, no code extraction needed
#
# Classification values:
#   "algorithm", "message_format", "protocol", "vocoder",
#   "measurement", "conformance", "overview", "interop_test",
#   "compliance", "location", "data", "infrastructure"

[meta]
project = "TIA-P25"
last_updated = "2026-04-16"
prompt_version = "2.1"
total_documents = 129
processed_phase3 = 21
extracted_phase2 = 2
pending = 106
notes = """
Processing pipeline: Upload PDF + docs/TIA_P25_Processing_Prompt_v2.md -> Claude extracts.
Files stay in per-document directories (TIA-102.XXXX/).
Only derived works (summaries, context, impl specs) are committed — PDFs and full-text
extractions are .gitignored. The download script (tools/_download_tia.py) lets anyone
fetch the originals from TIA's public library.
"""

